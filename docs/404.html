<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 – Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050816;
      --accent: #7c5cff;
      --accent-strong: #b794ff;
      --text: #f5f5ff;
      --muted: #a0a3b8;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --radius-pill: 999px;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: radial-gradient(circle at top, #151b3a 0, #050816 45%, #02010a 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 10px;
      background: linear-gradient(120deg, #e5e7ff, #c4b5fd, #7dd3fc);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #050816;
    }

    .btn-secondary {
      border: 1px solid var(--border-subtle);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>

    <div class="actions">
      <a class="btn btn-primary" href="/">← Back to Home</a>
      <a class="btn btn-secondary" href="/releases">View Releases</a>
    </div>
  </div>
</body>
</html>
